services:
  zhiya-server:
    build:
      context: ./zhiya-server
      dockerfile: Dockerfile
    container_name: zhiya-server
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./zhiya-server/data:/app/data
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
