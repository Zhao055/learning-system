services:
  zhiya-server:
    build:
      context: ./zhiya-server
      dockerfile: Dockerfile
    container_name: zhiya-server
    restart: unless-stopped
    ports:
      - "5820:3000"
    volumes:
      - ./zhiya-server/data:/app/data
    env_file:
      - .env.production
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
